version: "2"
sql:
  - schema: "data/sql/migrations"
    queries: "data/sql/queries"
    engine: "postgresql"
    gen:
      go:
        out: "gen/dbstore"
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true